<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .lane { stroke: #999; stroke-dasharray: 2 4; fill: none; }
      .head { fill: #e3f2fd; stroke: #333; rx: 6; }
      .arrow { stroke: #1976d2; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .arrowG { stroke: #555; stroke-width: 1.3; fill: none; marker-end: url(#arr); }
      .lbl { font-size: 11px; fill: #1976d2; }
      .small { font-size: 11px; }
      .step { fill: #fafafa; stroke: #ccc; rx: 4; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500" y="28" text-anchor="middle" font-weight="700" font-size="16">pnpm tools-dev start — 부트 시퀀스</text>

  <!-- lanes -->
  <rect class="head" x="40" y="55" width="180" height="34"/>
  <text x="130" y="77" text-anchor="middle" font-weight="600">tools-dev CLI</text>
  <rect class="head" x="260" y="55" width="220" height="34"/>
  <text x="370" y="77" text-anchor="middle" font-weight="600">daemon sidecar</text>
  <rect class="head" x="520" y="55" width="220" height="34"/>
  <text x="630" y="77" text-anchor="middle" font-weight="600">web sidecar (Next dev)</text>
  <rect class="head" x="780" y="55" width="190" height="34"/>
  <text x="875" y="77" text-anchor="middle" font-weight="600">desktop (옵션)</text>

  <line class="lane" x1="130" y1="90" x2="130" y2="570"/>
  <line class="lane" x1="370" y1="90" x2="370" y2="570"/>
  <line class="lane" x1="630" y1="90" x2="630" y2="570"/>
  <line class="lane" x1="875" y1="90" x2="875" y2="570"/>

  <!-- Step 1: parse -->
  <rect class="step" x="40" y="105" width="180" height="40"/>
  <text class="small" x="130" y="125" text-anchor="middle">1. config 해석</text>
  <text class="small" x="130" y="138" text-anchor="middle">namespace, ports, stamps</text>

  <!-- Step 2: stamp + spawn daemon -->
  <path class="arrow" d="M 220 175 L 260 175"/>
  <text class="lbl" x="200" y="170" text-anchor="end">2. createAppStamp + spawn</text>

  <rect class="step" x="270" y="195" width="200" height="60"/>
  <text class="small" x="370" y="215" text-anchor="middle">3. bootstrapSidecarRuntime</text>
  <text class="small" x="370" y="230" text-anchor="middle">stamp 검증 + IPC 경로 해석</text>
  <text class="small" x="370" y="245" text-anchor="middle">env: OD_SIDECAR_*</text>

  <rect class="step" x="270" y="265" width="200" height="60"/>
  <text class="small" x="370" y="285" text-anchor="middle">4. createJsonIpcServer</text>
  <text class="small" x="370" y="300" text-anchor="middle">listen on daemon.sock</text>
  <text class="small" x="370" y="315" text-anchor="middle">SQLite 열기 (.od/app.sqlite)</text>

  <rect class="step" x="270" y="335" width="200" height="40"/>
  <text class="small" x="370" y="355" text-anchor="middle">5. startServer (Express)</text>
  <text class="small" x="370" y="368" text-anchor="middle">routes 등록, HTTP listen</text>

  <!-- waitForHttpOk -->
  <path class="arrowG" d="M 270 175 C 220 200, 130 240, 220 380"/>
  <text class="small" x="200" y="270" text-anchor="end">waitForHttpOk</text>

  <!-- Step 6: spawn web -->
  <path class="arrow" d="M 220 410 L 260 410"/>
  <text class="lbl" x="200" y="405" text-anchor="end">6. STATUS → URL/PORT</text>

  <path class="arrow" d="M 470 410 L 520 410"/>
  <text class="lbl" x="495" y="402" text-anchor="middle">spawn web</text>

  <rect class="step" x="530" y="430" width="200" height="60"/>
  <text class="small" x="630" y="450" text-anchor="middle">7. Next dev 서버</text>
  <text class="small" x="630" y="465" text-anchor="middle">OD_PORT, OD_WEB_PORT env</text>
  <text class="small" x="630" y="480" text-anchor="middle">/api/* → daemon rewrite</text>

  <path class="arrowG" d="M 530 460 C 480 460, 280 470, 220 470"/>
  <text class="small" x="200" y="465" text-anchor="end">STATUS</text>

  <!-- Step 8: optional desktop -->
  <path class="arrow" d="M 220 510 C 400 540, 700 540, 780 510"/>
  <text class="lbl" x="500" y="555" text-anchor="middle">8. (옵션) spawn desktop sidecar</text>

  <rect class="step" x="785" y="430" width="180" height="60"/>
  <text class="small" x="875" y="450" text-anchor="middle">9. Electron BrowserWindow</text>
  <text class="small" x="875" y="465" text-anchor="middle">requestJsonIpc(web, STATUS)</text>
  <text class="small" x="875" y="480" text-anchor="middle">loadURL(reportedUrl)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
    <style>
      .box { stroke: #333; stroke-width: 1.3; rx: 8; fill: #fff; }
      .trigger { fill: #fce4ec; }
      .decision { fill: #fff3e0; }
      .action { fill: #e3f2fd; }
      .final { fill: #ffebee; stroke: #c62828; }
      .arrow { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .err { stroke: #c62828; stroke-width: 1.4; fill: none; marker-end: url(#arrR); }
      .title { font-weight: 600; font-size: 14px; }
      .small { font-size: 11px; fill: #555; }
      .tiny { font-size: 10px; fill: #777; }
      .mono { font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">취소 / 정리 흐름 (apps/daemon/src/runs.ts: cancel)</text>

  <!-- 3 triggers -->
  <rect class="box trigger" x="40" y="65" width="240" height="65"/>
  <text class="title" x="160" y="88" text-anchor="middle">트리거 1</text>
  <text class="small" x="160" y="108" text-anchor="middle">POST /api/runs/:id/cancel</text>
  <text class="tiny" x="160" y="122" text-anchor="middle">사용자 명시적 cancel</text>

  <rect class="box trigger" x="330" y="65" width="240" height="65"/>
  <text class="title" x="450" y="88" text-anchor="middle">트리거 2</text>
  <text class="small" x="450" y="108" text-anchor="middle">SSE 연결 끊김</text>
  <text class="tiny" x="450" y="122" text-anchor="middle">브라우저 탭 닫기, 새로고침</text>

  <rect class="box trigger" x="620" y="65" width="240" height="65"/>
  <text class="title" x="740" y="88" text-anchor="middle">트리거 3</text>
  <text class="small" x="740" y="108" text-anchor="middle">inactivity watchdog</text>
  <text class="tiny" x="740" y="122" text-anchor="middle">15초 stdout 무활동</text>

  <!-- Set flag -->
  <rect class="box action" x="320" y="165" width="260" height="55"/>
  <text class="title" x="450" y="188" text-anchor="middle">run.cancelRequested = true</text>
  <text class="small" x="450" y="208" text-anchor="middle">TERMINAL_RUN_STATUSES 확인</text>

  <!-- Decision: acpSession? -->
  <rect class="box decision" x="320" y="255" width="260" height="55"/>
  <text class="title" x="450" y="278" text-anchor="middle">run.acpSession?.abort 존재?</text>
  <text class="small" x="450" y="298" text-anchor="middle">ACP / Pi-RPC 어댑터인가</text>

  <!-- Branch 1: RPC abort first -->
  <rect class="box action" x="40" y="345" width="350" height="120"/>
  <text class="title" x="55" y="368">예 (RPC abort 우선)</text>
  <text class="small" x="55" y="388">1. run.acpSession.abort()</text>
  <text class="tiny"  x="55" y="403">   → JSON-RPC cancel 메시지 전송</text>
  <text class="small" x="55" y="423">2. setTimeout(graceMs) — 500ms~1000ms 대기</text>
  <text class="small" x="55" y="443">3. 살아있으면 child.kill('SIGTERM')</text>
  <text class="tiny" x="55" y="458" font-style="italic">.unref()로 데몬 종료 막지 않음</text>

  <!-- Branch 2: SIGTERM direct -->
  <rect class="box action" x="510" y="345" width="350" height="120"/>
  <text class="title" x="525" y="368">아니오 (일반 child)</text>
  <text class="small" x="525" y="388">1. child.kill('SIGTERM')</text>
  <text class="tiny" x="525" y="403">   → 자식이 cleanup 후 자발 종료</text>
  <text class="small" x="525" y="423">2. (또는) child가 없으면</text>
  <text class="small" x="525" y="443">   finish(run, 'canceled', null, 'SIGTERM')</text>
  <text class="tiny" x="525" y="458">   → 즉시 'end' 이벤트 emit</text>

  <!-- Last resort -->
  <rect class="box final" x="320" y="490" width="260" height="40"/>
  <text class="title" x="450" y="515" text-anchor="middle">최후의 수단: SIGKILL (1000ms 후)</text>

  <!-- arrows -->
  <path class="arrow" d="M 160 130 L 380 165"/>
  <path class="arrow" d="M 450 130 L 450 165"/>
  <path class="arrow" d="M 740 130 L 520 165"/>

  <path class="arrow" d="M 450 220 L 450 255"/>

  <path class="arrow" d="M 380 310 L 220 345"/>
  <path class="arrow" d="M 520 310 L 680 345"/>

  <path class="err" d="M 220 465 L 380 490"/>
  <path class="err" d="M 680 465 L 520 490"/>
</svg>

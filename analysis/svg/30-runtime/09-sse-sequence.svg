<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .lane    { stroke: #999; stroke-dasharray: 2 4; fill: none; }
      .head    { fill: #e3f2fd; stroke: #333; rx: 6; }
      .arrow   { stroke: #1976d2; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrowB  { stroke: #2e7d32; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrowR  { stroke: #c62828; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrowG  { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .small   { font-size: 11px; }
      .lbl     { font-size: 11px; fill: #1976d2; }
      .lblB    { font-size: 11px; fill: #2e7d32; }
      .lblR    { font-size: 11px; fill: #c62828; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">POST /api/chat — SSE 채팅 시퀀스</text>

  <!-- Lane headers -->
  <rect class="head" x="50" y="55" width="130" height="34"/>
  <text x="115" y="77" text-anchor="middle" font-weight="600">Client (web)</text>

  <rect class="head" x="240" y="55" width="160" height="34"/>
  <text x="320" y="77" text-anchor="middle" font-weight="600">Daemon HTTP</text>

  <rect class="head" x="460" y="55" width="160" height="34"/>
  <text x="540" y="77" text-anchor="middle" font-weight="600">Run Service</text>

  <rect class="head" x="680" y="55" width="170" height="34"/>
  <text x="765" y="77" text-anchor="middle" font-weight="600">Child Process</text>

  <!-- Lifelines -->
  <line class="lane" x1="115" y1="90" x2="115" y2="650"/>
  <line class="lane" x1="320" y1="90" x2="320" y2="650"/>
  <line class="lane" x1="540" y1="90" x2="540" y2="650"/>
  <line class="lane" x1="765" y1="90" x2="765" y2="650"/>

  <!-- Step 1: POST /api/chat -->
  <path class="arrow" d="M 115 115 L 320 115"/>
  <text class="lbl" x="155" y="110">1. POST /api/chat</text>

  <!-- Step 2: runs.create -->
  <path class="arrowG" d="M 320 140 L 540 140"/>
  <text class="small" x="360" y="135">2. runs.create()</text>

  <!-- Step 3: SSE headers -->
  <path class="arrow" d="M 320 175 L 115 175"/>
  <text class="lbl" x="170" y="170">3. HTTP 200 · text/event-stream</text>

  <!-- Step 4: startChatRun -->
  <path class="arrowG" d="M 320 205 L 540 205"/>
  <text class="small" x="360" y="200">4. start(run, startChatRun)</text>

  <!-- Step 5: validate -->
  <rect x="475" y="225" width="130" height="60" rx="4" fill="#fff" stroke="#666"/>
  <text class="small" x="540" y="245" text-anchor="middle">getAgentDef</text>
  <text class="small" x="540" y="261" text-anchor="middle">composeDaemonSystemPrompt</text>
  <text class="small" x="540" y="277" text-anchor="middle">imagePath UPLOAD_DIR 검증</text>

  <!-- Step 6: spawn -->
  <path class="arrowG" d="M 540 305 L 765 305"/>
  <text class="small" x="585" y="300">6. spawn(bin, args, {cwd, env})</text>

  <!-- Step 7: emit start -->
  <path class="arrow" d="M 540 340 L 115 340"/>
  <text class="lbl" x="170" y="335">7. event: start  (runId, agentId, ...)</text>

  <!-- Step 8: stdin write -->
  <path class="arrowG" d="M 540 370 L 765 370"/>
  <text class="small" x="585" y="365">8. stdin.write(prompt) [promptViaStdin]</text>

  <!-- Step 9: stdout streaming → parser → agent events -->
  <rect x="700" y="395" width="130" height="60" rx="4" fill="#fff" stroke="#666"/>
  <text class="small" x="765" y="415" text-anchor="middle">9. stdout 라인</text>
  <text class="small" x="765" y="431" text-anchor="middle">claude-stream-json</text>
  <text class="small" x="765" y="447" text-anchor="middle">/ acp / pi-rpc / ...</text>

  <path class="arrowG" d="M 700 425 L 540 425"/>

  <rect x="475" y="465" width="130" height="60" rx="4" fill="#fff" stroke="#666"/>
  <text class="small" x="540" y="485" text-anchor="middle">파서 → ChatSseEvent</text>
  <text class="small" x="540" y="501" text-anchor="middle">sendAgentEvent()</text>
  <text class="small" x="540" y="517" text-anchor="middle">noteAgentActivity (watchdog)</text>

  <!-- Step 10: agent events to client -->
  <path class="arrow" d="M 540 540 L 115 540"/>
  <text class="lbl" x="170" y="535">10. event: agent (text_delta · tool_use · tool_result · usage)</text>

  <!-- Step 11: cancel (optional) -->
  <path class="arrowR" d="M 115 575 L 320 575"/>
  <text class="lblR" x="135" y="570">11. POST /api/runs/:id/cancel</text>

  <path class="arrowR" d="M 320 600 L 540 600"/>
  <text class="lblR" x="360" y="595">design.runs.cancel()</text>

  <path class="arrowR" d="M 540 625 L 765 625"/>
  <text class="lblR" x="595" y="620">SIGTERM → 1s → SIGKILL</text>

  <!-- Final: event: end -->
  <path class="arrowB" d="M 540 650 L 115 650"/>
  <text class="lblB" x="170" y="645">12. event: end (status, code, signal)</text>

  <!-- Note row -->
  <rect x="40" y="100" width="0" height="0"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <style>
      .state { stroke: #333; stroke-width: 1.5; rx: 40; fill: #fff; }
      .start { fill: #e3f2fd; }
      .running { fill: #e8f5e9; }
      .term { fill: #fff3e0; }
      .end { fill: #f5f5f5; }
      .arrow { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .ok { stroke: #2e7d32; stroke-width: 1.4; fill: none; marker-end: url(#arrG); }
      .err { stroke: #c62828; stroke-width: 1.4; fill: none; marker-end: url(#arrR); }
      .title { font-weight: 600; font-size: 14px; }
      .small { font-size: 11px; fill: #555; }
      .tiny { font-size: 10px; fill: #777; }
      .lbl { font-size: 11px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">에이전트 자식 프로세스 — 상태 머신</text>

  <!-- States -->
  <rect class="state start" x="60" y="80" width="170" height="60"/>
  <text font-weight="600" x="145" y="105" text-anchor="middle">queued</text>
  <text class="small" x="145" y="125" text-anchor="middle">runs.create() 직후</text>

  <rect class="state start" x="60" y="200" width="170" height="60"/>
  <text font-weight="600" x="145" y="225" text-anchor="middle">starting</text>
  <text class="small" x="145" y="245" text-anchor="middle">validate + composePrompt</text>

  <rect class="state running" x="350" y="200" width="200" height="60"/>
  <text font-weight="600" x="450" y="225" text-anchor="middle">running</text>
  <text class="small" x="450" y="245" text-anchor="middle">child.stdout · parser → SSE</text>

  <rect class="state term" x="350" y="320" width="200" height="60"/>
  <text font-weight="600" x="450" y="345" text-anchor="middle">terminating</text>
  <text class="small" x="450" y="365" text-anchor="middle">stdin.end() / abort / SIGTERM</text>

  <rect class="state end running" x="670" y="200" width="170" height="60"/>
  <text font-weight="600" x="755" y="225" text-anchor="middle">succeeded</text>
  <text class="small" x="755" y="245" text-anchor="middle">code 0, agentProducedOutput</text>

  <rect class="state end term" x="670" y="320" width="170" height="60"/>
  <text font-weight="600" x="755" y="345" text-anchor="middle">canceled</text>
  <text class="small" x="755" y="365" text-anchor="middle">사용자 cancel</text>

  <rect class="state end" x="670" y="440" width="170" height="60" fill="#ffebee" stroke="#c62828"/>
  <text font-weight="600" x="755" y="465" text-anchor="middle">failed</text>
  <text class="small" x="755" y="485" text-anchor="middle">에러 / 비정상 종료</text>

  <!-- Transitions -->
  <path class="arrow" d="M 145 140 L 145 200"/>
  <text class="lbl" x="155" y="175">runs.start(run, startChatRun)</text>

  <path class="arrow" d="M 230 230 L 350 230"/>
  <text class="lbl" x="240" y="220">spawn(bin, args) 성공</text>

  <path class="err" d="M 145 260 C 145 350, 200 440, 670 470"/>
  <text class="lbl" x="200" y="320" fill="#c62828">getAgentDef · bin 미설치</text>
  <text class="lbl" x="200" y="335" fill="#c62828">prompt 예산 초과</text>

  <path class="ok" d="M 550 230 L 670 230"/>
  <text class="lbl" x="560" y="220" fill="#2e7d32">close (code=0)</text>

  <path class="err" d="M 550 245 C 600 280, 650 350, 670 460"/>
  <text class="lbl" x="615" y="380" fill="#c62828">close (code≠0)</text>
  <text class="lbl" x="615" y="395" fill="#c62828">에이전트 stream error</text>

  <path class="arrow" d="M 450 260 L 450 320"/>
  <text class="lbl" x="460" y="295">cancel() 또는</text>
  <text class="lbl" x="460" y="310">SSE close (run.cancelRequested)</text>

  <path class="arrow" d="M 550 350 L 670 350"/>
  <text class="lbl" x="560" y="340">SIGTERM 후 종료</text>

  <!-- watchdog -->
  <path class="err" d="M 450 200 C 400 150, 350 130, 450 130 C 500 130, 500 165, 450 200" stroke-dasharray="3 3"/>
  <text class="lbl" x="450" y="125" fill="#c62828" text-anchor="middle">inactivity watchdog (15s 무활동)</text>

  <!-- Notes -->
  <rect x="40" y="430" width="600" height="90" rx="6" fill="#fafafa" stroke="#ccc"/>
  <text class="title" x="55" y="453">취소 우선순위 (apps/daemon/src/runs.ts)</text>
  <text class="small" x="55" y="473">1. ACP/Pi RPC abort (있을 때) + 500ms grace</text>
  <text class="small" x="55" y="488">2. SIGTERM 송신 (graceMs)</text>
  <text class="small" x="55" y="503">3. 1000ms 후에도 살아있으면 SIGKILL (최후의 수단)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
    <style>
      .box     { stroke: #333; stroke-width: 1.3; rx: 8; fill: #fff; }
      .user    { fill: #e3f2fd; }
      .builtin { fill: #f5f5f5; }
      .step    { fill: #fff3e0; }
      .out     { fill: #e8f5e9; }
      .title   { font-weight: 600; font-size: 14px; }
      .small   { font-size: 11px; fill: #555; }
      .tiny    { font-size: 10px; fill: #777; }
      .arrow   { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .shadow  { stroke: #c62828; stroke-width: 1.5; fill: none; marker-end: url(#arrR); stroke-dasharray: 5 3; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">skills.ts — listSkills 흐름 + shadowing 패턴</text>

  <!-- Two roots -->
  <rect class="box user" x="40" y="65" width="380" height="90"/>
  <text class="title" x="55" y="88">USER_SKILLS_DIR  (.od/skills/)</text>
  <text class="small" x="55" y="106">사용자 편집/생성 스킬 — listSkills 첫 번째 루트</text>
  <text class="small" x="55" y="122">우선순위 높음 · source = "user"</text>
  <text class="small" x="55" y="138">동일 ID가 빌트인에도 있으면 빌트인을 가림 (shadow)</text>

  <rect class="box builtin" x="480" y="65" width="380" height="90"/>
  <text class="title" x="495" y="88">BUILTIN_SKILLS_DIR  (skills/)</text>
  <text class="small" x="495" y="106">레포 번들 스킬 — listSkills 두 번째 루트</text>
  <text class="small" x="495" y="122">우선순위 낮음 · source = "built-in"</text>
  <text class="small" x="495" y="138">USER에 같은 ID 없으면 그대로 노출</text>

  <!-- listSkills flow -->
  <rect class="box step" x="40" y="190" width="820" height="180"/>
  <text class="title" x="55" y="215">listSkills([USER, BUILTIN]) — 6단계 흐름</text>

  <rect x="60" y="230" width="115" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="117" y="250" text-anchor="middle" font-weight="600">1. 루트 순회</text>
  <text class="small" x="117" y="268" text-anchor="middle">readdir(root)</text>
  <text class="small" x="117" y="283" text-anchor="middle">isDirectory/Symlink</text>
  <text class="small" x="117" y="298" text-anchor="middle">SKILL.md 존재?</text>
  <text class="small" x="117" y="320" text-anchor="middle" font-style="italic">source =</text>
  <text class="small" x="117" y="334" text-anchor="middle" font-style="italic">user / built-in</text>

  <rect x="190" y="230" width="115" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="247" y="250" text-anchor="middle" font-weight="600">2. parseFrontmatter</text>
  <text class="small" x="247" y="268" text-anchor="middle">의존성 0 YAML 파서</text>
  <text class="small" x="247" y="283" text-anchor="middle">--- 구분</text>
  <text class="small" x="247" y="298" text-anchor="middle">data + body 분리</text>
  <text class="small" x="247" y="320" text-anchor="middle">parentId =</text>
  <text class="small" x="247" y="334" text-anchor="middle">data.name ?? entry.name</text>

  <rect x="320" y="230" width="115" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="377" y="250" text-anchor="middle" font-weight="600">3. shadowing</text>
  <text class="small" x="377" y="270" text-anchor="middle">seenIds.has(id)?</text>
  <text class="small" x="377" y="288" text-anchor="middle">→ continue</text>
  <text class="small" x="377" y="312" text-anchor="middle">seenIds.add(id)</text>
  <text class="small" x="377" y="334" text-anchor="middle" font-style="italic" fill="#c62828">user가 builtin 가림</text>

  <rect x="450" y="230" width="115" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="507" y="250" text-anchor="middle" font-weight="600">4. 정규화</text>
  <text class="small" x="507" y="268" text-anchor="middle">normalizeMode</text>
  <text class="small" x="507" y="283" text-anchor="middle">normalizeScenario</text>
  <text class="small" x="507" y="298" text-anchor="middle">normalizeCategory</text>
  <text class="small" x="507" y="313" text-anchor="middle">normalizeCraft</text>
  <text class="small" x="507" y="334" text-anchor="middle" font-style="italic">한·중·영 키워드</text>

  <rect x="580" y="230" width="120" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="640" y="250" text-anchor="middle" font-weight="600">5. 프리앰블</text>
  <text class="small" x="640" y="270" text-anchor="middle">references/* 또는</text>
  <text class="small" x="640" y="285" text-anchor="middle">assets/* 본문 언급 시</text>
  <text class="small" x="640" y="305" text-anchor="middle">.od-skills/&lt;folder&gt;/</text>
  <text class="small" x="640" y="320" text-anchor="middle">상대 + 절대 경로</text>
  <text class="small" x="640" y="338" text-anchor="middle" font-style="italic">자동 inject</text>

  <rect x="715" y="230" width="130" height="120" rx="4" fill="#fff" stroke="#999"/>
  <text x="780" y="250" text-anchor="middle" font-weight="600">6. derived examples</text>
  <text class="small" x="780" y="270" text-anchor="middle">examples/&lt;k&gt;.html</text>
  <text class="small" x="780" y="285" text-anchor="middle">→ &lt;parent&gt;:&lt;k&gt;</text>
  <text class="small" x="780" y="303" text-anchor="middle">부모.aggregatesExamples</text>
  <text class="small" x="780" y="318" text-anchor="middle">= true</text>
  <text class="small" x="780" y="336" text-anchor="middle" font-style="italic">isSafeExampleKey 검증</text>

  <!-- flow arrows -->
  <path class="arrow" d="M 175 290 L 190 290"/>
  <path class="arrow" d="M 305 290 L 320 290"/>
  <path class="arrow" d="M 435 290 L 450 290"/>
  <path class="arrow" d="M 565 290 L 580 290"/>
  <path class="arrow" d="M 700 290 L 715 290"/>

  <!-- root → step 1 arrows -->
  <path class="arrow" d="M 230 155 L 117 230"/>
  <path class="arrow" d="M 670 155 L 117 230"/>

  <!-- Shadow arrow -->
  <path class="shadow" d="M 670 155 C 600 170, 500 175, 420 155"/>
  <text class="tiny" x="500" y="178" fill="#c62828">user에 같은 ID 있으면 가려짐</text>

  <!-- Output: SkillInfo array -->
  <rect class="box out" x="40" y="405" width="820" height="90"/>
  <text class="title" x="55" y="428">결과: SkillInfo[]</text>
  <text class="small" x="55" y="448">{ id, name, description, triggers, mode, surface, source, craftRequires, platform, scenario, category,</text>
  <text class="small" x="55" y="464">  previewType, designSystemRequired, defaultFor, upstream, featured, fidelity, speakerNotes, animations,</text>
  <text class="small" x="55" y="480">  examplePrompt, aggregatesExamples, body (프리앰블 포함), dir }</text>

  <!-- Auto-clone branch -->
  <rect class="box" x="40" y="515" width="820" height="70"/>
  <text class="title" x="55" y="538">자동 클론 (사용자가 빌트인 편집 시 PUT /api/skills/:id)</text>
  <text class="small" x="55" y="557">USER 폴더 없으면 mkdir → cloneSkillSideFiles(builtinDir, userDir)로 assets/references/examples 복사 (SKILL.md 제외)</text>
  <text class="small" x="55" y="573">→ 사용자 편집 SKILL.md만 신규 폴더에 작성 → 다음 listSkills() 호출 시 자동 shadow 활성화</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <style>
      .box { stroke: #333; stroke-width: 1.3; rx: 8; fill: #fff; }
      .stamp { fill: #e3f2fd; }
      .ipc { fill: #fff3e0; }
      .err { fill: #ffebee; }
      .title { font-weight: 600; font-size: 14px; }
      .small { font-size: 11px; fill: #555; }
      .mono { font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">sidecar-proto — 5-stamp 디스크립터 + IPC 메시지 종류</text>

  <!-- 5 fields -->
  <rect class="box stamp" x="40" y="55" width="820" height="200"/>
  <text class="title" x="55" y="80">5-stamp 필드 (정확히 5개, AGENTS.md 강제)</text>

  <g>
    <rect x="60" y="95" width="155" height="145" rx="6" fill="#fff" stroke="#1976d2"/>
    <text font-weight="700" x="137" y="115" text-anchor="middle">app</text>
    <text class="small" x="137" y="135" text-anchor="middle">AppKey</text>
    <text class="mono" x="137" y="158" text-anchor="middle">daemon</text>
    <text class="mono" x="137" y="174" text-anchor="middle">web</text>
    <text class="mono" x="137" y="190" text-anchor="middle">desktop</text>
    <text class="small" x="137" y="218" text-anchor="middle">어떤 OD 앱인가</text>

    <rect x="225" y="95" width="155" height="145" rx="6" fill="#fff" stroke="#1976d2"/>
    <text font-weight="700" x="302" y="115" text-anchor="middle">mode</text>
    <text class="small" x="302" y="135" text-anchor="middle">SidecarMode</text>
    <text class="mono" x="302" y="158" text-anchor="middle">dev</text>
    <text class="mono" x="302" y="174" text-anchor="middle">runtime</text>
    <text class="small" x="302" y="218" text-anchor="middle">개발 vs 런타임</text>

    <rect x="390" y="95" width="155" height="145" rx="6" fill="#fff" stroke="#1976d2"/>
    <text font-weight="700" x="467" y="115" text-anchor="middle">namespace</text>
    <text class="small" x="467" y="135" text-anchor="middle">^[A-Za-z0-9]</text>
    <text class="small" x="467" y="150" text-anchor="middle">[A-Za-z0-9._-]{0,127}$</text>
    <text class="mono" x="467" y="180" text-anchor="middle">default</text>
    <text class="small" x="467" y="218" text-anchor="middle">다중 인스턴스 격리</text>

    <rect x="555" y="95" width="155" height="145" rx="6" fill="#fff" stroke="#1976d2"/>
    <text font-weight="700" x="632" y="115" text-anchor="middle">ipc</text>
    <text class="small" x="632" y="135" text-anchor="middle">절대 경로</text>
    <text class="small" x="632" y="160" text-anchor="middle">POSIX: /tmp/...</text>
    <text class="small" x="632" y="176" text-anchor="middle">Win: \\.\pipe\...</text>
    <text class="small" x="632" y="218" text-anchor="middle">IPC 소켓 위치</text>

    <rect x="720" y="95" width="125" height="145" rx="6" fill="#fff" stroke="#1976d2"/>
    <text font-weight="700" x="782" y="115" text-anchor="middle">source</text>
    <text class="small" x="782" y="135" text-anchor="middle">SidecarSource</text>
    <text class="mono" x="782" y="158" text-anchor="middle">packaged</text>
    <text class="mono" x="782" y="174" text-anchor="middle">tools-dev</text>
    <text class="mono" x="782" y="190" text-anchor="middle">tools-pack</text>
    <text class="small" x="782" y="218" text-anchor="middle">스폰 출처</text>
  </g>

  <!-- IPC messages -->
  <rect class="box ipc" x="40" y="275" width="820" height="200"/>
  <text class="title" x="55" y="300">IPC 메시지 8종 (discriminated union)</text>

  <g>
    <rect x="60" y="315" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="150" y="335" text-anchor="middle" font-size="12">STATUS</text>
    <text class="small" x="150" y="352" text-anchor="middle">모두 응답</text>
    <text class="small" x="150" y="367" text-anchor="middle">{ pid, state, url, ... }</text>

    <rect x="250" y="315" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="340" y="335" text-anchor="middle" font-size="12">SHUTDOWN</text>
    <text class="small" x="340" y="352" text-anchor="middle">모두 응답</text>
    <text class="small" x="340" y="367" text-anchor="middle">우아한 종료 요청</text>

    <rect x="440" y="315" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="530" y="335" text-anchor="middle" font-size="12">EVAL</text>
    <text class="small" x="530" y="352" text-anchor="middle">desktop 전용</text>
    <text class="small" x="530" y="367" text-anchor="middle">DevTools JS 실행</text>

    <rect x="630" y="315" width="210" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="735" y="335" text-anchor="middle" font-size="12">SCREENSHOT</text>
    <text class="small" x="735" y="352" text-anchor="middle">desktop 전용</text>
    <text class="small" x="735" y="367" text-anchor="middle">화면 캡처 → 경로</text>

    <rect x="60" y="385" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="150" y="405" text-anchor="middle" font-size="12">CONSOLE</text>
    <text class="small" x="150" y="422" text-anchor="middle">desktop 전용</text>
    <text class="small" x="150" y="437" text-anchor="middle">콘솔 로그 조회</text>

    <rect x="250" y="385" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="340" y="405" text-anchor="middle" font-size="12">CLICK</text>
    <text class="small" x="340" y="422" text-anchor="middle">desktop 전용</text>
    <text class="small" x="340" y="437" text-anchor="middle">CSS 셀렉터 클릭</text>

    <rect x="440" y="385" width="180" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="530" y="405" text-anchor="middle" font-size="12">EXPORT_PDF</text>
    <text class="small" x="530" y="422" text-anchor="middle">desktop 전용</text>
    <text class="small" x="530" y="437" text-anchor="middle">현재 페이지 → PDF</text>

    <rect x="630" y="385" width="210" height="60" rx="4" fill="#fff" stroke="#666"/>
    <text font-weight="600" x="735" y="405" text-anchor="middle" font-size="12">REGISTER_DESKTOP_AUTH</text>
    <text class="small" x="735" y="422" text-anchor="middle">daemon 전용</text>
    <text class="small" x="735" y="437" text-anchor="middle">HMAC secret 등록</text>
  </g>

  <text class="small" x="55" y="461" font-style="italic">전송 형식: {...json...}\n (개행 구분) · 응답: {ok: true, result} 또는 {ok: false, error: {code, message}}</text>

  <!-- Error codes -->
  <rect class="box err" x="40" y="495" width="820" height="65"/>
  <text class="title" x="55" y="520">에러 의미론 (SIDECAR_ERROR_CODES + SidecarContractError)</text>
  <text class="small" x="55" y="540">- INVALID_MESSAGE: 메시지 형식 위반 (필드 누락, 정규식 불일치, null byte 등)</text>
  <text class="small" x="55" y="555">- UNKNOWN_MESSAGE: 미지원 type 또는 해당 앱이 처리할 수 없는 메시지</text>
</svg>

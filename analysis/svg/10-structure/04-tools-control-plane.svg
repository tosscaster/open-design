<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .box     { stroke: #333; stroke-width: 1.3; rx: 8; fill: #fff; }
      .dev     { fill: #e3f2fd; }
      .pack    { fill: #fce4ec; }
      .pr      { fill: #fff3e0; }
      .title   { font-weight: 600; font-size: 14px; }
      .small   { font-size: 11px; fill: #555; }
      .arrow   { stroke: #555; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
      .read    { stroke: #2e7d32; stroke-width: 1.4; fill: none; marker-end: url(#arr); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="450" y="28" text-anchor="middle" font-weight="700" font-size="16">tools/ — 3개 컨트롤 플레인</text>

  <!-- tools-dev (left) -->
  <rect class="box dev" x="40" y="70" width="270" height="200"/>
  <text class="title" x="55" y="95">@open-design/tools-dev</text>
  <text class="small" x="55" y="113">로컬 라이프사이클 컨트롤 플레인</text>
  <text x="55" y="138" font-weight="600" font-size="12">서브명령 (8)</text>
  <text class="small" x="55" y="156">start · run · stop · restart</text>
  <text class="small" x="55" y="172">status · logs · inspect · check</text>
  <text x="55" y="195" font-weight="600" font-size="12">주요 플래그</text>
  <text class="small" x="55" y="213">--namespace · --daemon-port</text>
  <text class="small" x="55" y="229">--web-port · --json · --prod</text>
  <text x="55" y="252" font-weight="600" font-size="12">사이드카 IPC 호출</text>
  <text class="small" x="55" y="263">STATUS · EVAL · SCREENSHOT · CLICK</text>

  <!-- tools-pack (center) -->
  <rect class="box pack" x="320" y="70" width="270" height="200"/>
  <text class="title" x="335" y="95">@open-design/tools-pack</text>
  <text class="small" x="335" y="113">데스크탑 패키지 빌드/배포</text>
  <text x="335" y="138" font-weight="600" font-size="12">플랫폼 분기</text>
  <text class="small" x="335" y="156">mac (build/install/start/stop/...)</text>
  <text class="small" x="335" y="172">win (... + list/reset)</text>
  <text class="small" x="335" y="188">linux (... + --containerized)</text>
  <text x="335" y="211" font-weight="600" font-size="12">빌드 산출</text>
  <text class="small" x="335" y="229">--to all | app | dmg | zip | nsis</text>
  <text class="small" x="335" y="245">electron-builder · macAdhocSign</text>
  <text class="small" x="335" y="263">--signed (macOS notarize)</text>

  <!-- tools-pr (right) -->
  <rect class="box pr" x="600" y="70" width="260" height="200"/>
  <text class="title" x="615" y="95">@open-design/tools-pr</text>
  <text class="small" x="615" y="113">PR-duty 분석 (read-only `gh` 래퍼)</text>
  <text x="615" y="138" font-weight="600" font-size="12">서브명령 (4)</text>
  <text class="small" x="615" y="156">list · view · classify · assignment</text>
  <text x="615" y="181" font-weight="600" font-size="12">자동 도출</text>
  <text class="small" x="615" y="199">lane (skill / design-system / contract / craft / docs / multi)</text>
  <text class="small" x="615" y="215">15+ 팩트 태그 (bot-only-approval, …)</text>
  <text class="small" x="615" y="231">forbidden surface (apps/nextjs, …)</text>
  <text class="small" x="615" y="247">검증 명령 (path-based)</text>
  <text class="small" x="615" y="263" font-style="italic">approve/merge/comment 미실행</text>

  <!-- Targets row -->
  <rect class="box" x="40" y="330" width="270" height="170"/>
  <text class="title" x="55" y="355">대상</text>
  <text class="small" x="55" y="375">daemon sidecar</text>
  <text class="small" x="55" y="391">web sidecar</text>
  <text class="small" x="55" y="407">desktop sidecar (Electron)</text>
  <text class="small" x="55" y="430" font-weight="600">파일 위치</text>
  <text class="small" x="55" y="448">.tmp/tools-dev/&lt;namespace&gt;/…</text>
  <text class="small" x="55" y="464">IPC: /tmp/open-design/ipc/…</text>
  <text class="small" x="55" y="486" font-weight="600">env 변수</text>
  <text class="small" x="55" y="497">OD_PORT · OD_WEB_PORT</text>

  <rect class="box" x="320" y="330" width="270" height="170"/>
  <text class="title" x="335" y="355">대상</text>
  <text class="small" x="335" y="375">Electron Builder targets</text>
  <text class="small" x="335" y="391">_assembled app dir · dmg · zip · nsis</text>
  <text class="small" x="335" y="407">workspace tarballs · resources</text>
  <text class="small" x="335" y="430" font-weight="600">7단계 파이프라인 (Mac)</text>
  <text class="small" x="335" y="448">1. workspace-build  4. resources</text>
  <text class="small" x="335" y="464">2. tarballs  5. assembled-app</text>
  <text class="small" x="335" y="480">3. cache  6. builder  7. artifacts</text>
  <text class="small" x="335" y="497">스코프: namespace, 포트 비-사용</text>

  <rect class="box" x="600" y="330" width="260" height="170"/>
  <text class="title" x="615" y="355">대상</text>
  <text class="small" x="615" y="375">`gh` API (read-only)</text>
  <text class="small" x="615" y="391">gh pr list/view · gh api</text>
  <text class="small" x="615" y="407">.tmp/tools-pr/classify/&lt;name&gt;.json</text>
  <text class="small" x="615" y="430" font-weight="600">lane 분류 정규식</text>
  <text class="small" x="615" y="448">/^skills/[^/]+//</text>
  <text class="small" x="615" y="464">/^design-systems/[^/]+//</text>
  <text class="small" x="615" y="480">/^craft/[^/]+\.md$/</text>
  <text class="small" x="615" y="496">CONTRACT_PATHS (contracts, proto, routes)</text>

  <!-- arrows -->
  <path class="arrow" d="M 175 270 L 175 330"/>
  <path class="arrow" d="M 455 270 L 455 330"/>
  <path class="read" d="M 730 270 L 730 330"/>

  <!-- legend -->
  <text class="small" x="450" y="535" text-anchor="middle">tools-dev/pack은 사이드카 패키지(proto+sidecar+platform)에 의존; tools-pr은 독립적 `gh` 래퍼</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .box { stroke: #333; stroke-width: 1.3; rx: 8; fill: #fff; }
      .core { fill: #e3f2fd; }
      .routes { fill: #fff3e0; }
      .runtime { fill: #fce4ec; }
      .data { fill: #e8f5e9; }
      .ext { fill: #f3e5f5; }
      .title { font-weight: 600; font-size: 14px; }
      .small { font-size: 11px; fill: #555; }
      .tiny { font-size: 10px; fill: #777; }
      .arrow { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arr); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500" y="28" text-anchor="middle" font-weight="700" font-size="16">apps/daemon — 내부 모듈 맵</text>

  <!-- Core bootstrap -->
  <rect class="box core" x="40" y="60" width="920" height="80"/>
  <text class="title" x="60" y="85">부트스트랩</text>
  <rect x="60" y="95" width="180" height="35" rx="4" fill="#fff" stroke="#999"/>
  <text x="150" y="118" text-anchor="middle" font-size="12">cli.ts — `od` 진입점</text>
  <rect x="260" y="95" width="180" height="35" rx="4" fill="#fff" stroke="#999"/>
  <text x="350" y="118" text-anchor="middle" font-size="12">server.ts — Express bootstrap</text>
  <rect x="460" y="95" width="180" height="35" rx="4" fill="#fff" stroke="#999"/>
  <text x="550" y="118" text-anchor="middle" font-size="12">sidecar/ — 사이드카 엔트리</text>
  <rect x="660" y="95" width="280" height="35" rx="4" fill="#fff" stroke="#999"/>
  <text x="800" y="118" text-anchor="middle" font-size="12">runs.ts — Run 라이프사이클</text>

  <!-- Routes -->
  <rect class="box routes" x="40" y="160" width="480" height="220"/>
  <text class="title" x="55" y="185">도메인 라우트 (10+)</text>
  <g font-size="11" fill="#333">
    <rect x="55" y="200" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="215">chat-routes.ts · /api/chat (SSE)</text>
    <rect x="55" y="226" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="241">project-routes.ts · 프로젝트 CRUD</text>
    <rect x="55" y="252" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="267">live-artifact-routes.ts</text>
    <rect x="55" y="278" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="293">import-export-routes.ts</text>
    <rect x="55" y="304" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="319">deploy-routes.ts</text>
    <rect x="55" y="330" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="63" y="345">routine-routes.ts</text>

    <rect x="285" y="200" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="215">mcp-routes.ts · /api/mcp/*</text>
    <rect x="285" y="226" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="241">active-context-routes.ts</text>
    <rect x="285" y="252" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="267">connector/routes.ts · Composio</text>
    <rect x="285" y="278" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="293">static-resource-routes.ts</text>
    <rect x="285" y="304" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="319">media-routes.ts</text>
    <rect x="285" y="330" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
    <text x="293" y="345">proxy/{anthropic,openai,azure,google}</text>
  </g>

  <!-- Runtimes + prompts -->
  <rect class="box runtime" x="540" y="160" width="420" height="220"/>
  <text class="title" x="555" y="185">runtimes/ + prompts/</text>

  <text font-size="12" fill="#333" x="555" y="208" font-weight="600">runtimes/</text>
  <rect x="555" y="215" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="230">defs/&lt;id&gt;.ts × 16 — RuntimeAgentDef 선언</text>
  <rect x="555" y="241" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="256">claude-stream.ts · json-event-stream.ts</text>
  <rect x="555" y="267" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="282">acp.ts (JSON-RPC) · pi-rpc.ts</text>
  <rect x="555" y="293" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="308">detection.ts · executables.ts · capabilities.ts</text>

  <text font-size="12" fill="#333" x="555" y="335" font-weight="600">prompts/</text>
  <rect x="555" y="343" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="358">discovery.ts · directions.ts · system.ts (43KB)</text>

  <!-- Data layer -->
  <rect class="box data" x="40" y="400" width="480" height="160"/>
  <text class="title" x="55" y="425">데이터 + 카탈로그</text>
  <rect x="55" y="440" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="63" y="455">db.ts — SQLite 12+ 테이블 (WAL)</text>
  <rect x="55" y="466" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="63" y="481">projects.ts — 경로/파일 가드</text>
  <rect x="55" y="492" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="63" y="507">media-tasks.ts · critique/persistence.ts</text>
  <rect x="55" y="518" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="63" y="533">memory.ts · media-config.ts</text>

  <rect x="285" y="440" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="293" y="455">skills.ts — frontmatter + shadowing</text>
  <rect x="285" y="466" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="293" y="481">design-systems.ts — DESIGN.md 스캐너</text>
  <rect x="285" y="492" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="293" y="507">frontmatter.ts — 의존성 0 YAML 파서</text>
  <rect x="285" y="518" width="220" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="293" y="533">lint-artifact.ts — anti-AI-slop</text>

  <!-- External integrations -->
  <rect class="box ext" x="540" y="400" width="420" height="160"/>
  <text class="title" x="555" y="425">외부 통합</text>
  <rect x="555" y="440" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="455">mcp-oauth.ts — PKCE/RFC 7636</text>
  <rect x="555" y="466" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="481">media.ts — gpt-image-2 / Seedance / HyperFrames</text>
  <rect x="555" y="492" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="507">langfuse-bridge.ts — 텔레메트리 릴레이</text>
  <rect x="555" y="518" width="390" height="22" rx="3" fill="#fff" stroke="#bbb"/>
  <text font-size="11" x="563" y="533">finalize-design.ts — ZIP 패키징</text>

  <!-- arrows -->
  <path class="arrow" d="M 350 130 L 280 160"/>
  <path class="arrow" d="M 350 130 L 720 160"/>
  <path class="arrow" d="M 280 380 L 280 400"/>
  <path class="arrow" d="M 720 380 L 720 400"/>

  <text class="tiny" x="500" y="610" text-anchor="middle">server.ts가 모든 route 모듈을 ServerContext와 함께 register — 새 도메인은 *-routes.ts 파일 하나만 추가</text>
</svg>
